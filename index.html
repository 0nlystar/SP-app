<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Cloud - Fixed Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .progress-box { position: relative; width: 100%; height: 26px; background: #f1f5f9; border-radius: 99px; overflow: hidden; border: 1px solid #e2e8f0; }
        .progress-fill { height: 100%; background: #10b981; transition: width 0.6s ease; }
        .progress-text { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: 800; color: #1e293b; mix-blend-mode: multiply; }
        .report-pending { border-left: 6px solid #f59e0b !important; background-color: #fffbeb !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32">

    <header class="sticky top-0 bg-white border-b z-40 p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white text-sm">💰</div>
            <h1 class="font-bold text-slate-800" id="currentTitle">สรุปยอดเงิน</h1>
        </div>
        <div class="flex gap-1">
            <button onclick="generatePDF('shopee')" class="bg-orange-50 text-orange-600 px-2 py-1 rounded-lg text-[10px] font-bold border border-orange-100">PDF Shopee</button>
            <button onclick="generatePDF('loan')" class="bg-blue-50 text-blue-600 px-2 py-1 rounded-lg text-[10px] font-bold border border-blue-100">PDF เงินกู้</button>
            <button onclick="loginAdmin()" id="adminLock" class="bg-slate-100 p-2 rounded-lg ml-1">🔒</button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
        <section id="page-home" class="page-section active">
            <div class="bg-slate-900 rounded-[2rem] p-8 text-white shadow-xl mb-6 text-center border-b-4 border-emerald-500">
                <p class="opacity-60 text-[10px] font-bold uppercase mb-1 tracking-widest">ยอดรวมต้องเก็บเดือนนี้</p>
                <div id="totalMonthlyAmount" class="text-4xl font-black italic">฿0</div>
            </div>
            <div id="monthlySummaryArea" class="space-y-3">
                </div>
        </section>

        <section id="page-active" class="page-section">
            <div id="adminPanel" class="hidden mb-6 bg-white p-6 rounded-[2rem] shadow-md border">
                <div id="nameTagsArea" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="space-y-3">
                    <input type="text" id="debtorName" placeholder="ชื่อลูกหนี้" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
                    <input type="text" id="itemName" placeholder="รายการ" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 p-3 bg-slate-50 rounded-xl font-bold">
                            <option value="shopee">Shopee</option>
                            <option value="loan">เงินกู้</option>
                        </select>
                        <input type="number" id="defaultAmount" placeholder="ยอด/งวด" class="flex-1 p-3 bg-slate-50 rounded-xl font-bold text-center">
                        <select id="totalMonths" class="w-20 p-3 bg-slate-50 rounded-xl font-bold">
                            <option value="1">1</option><option value="3">3</option><option value="6">6</option><option value="12" selected>12</option>
                        </select>
                    </div>
                    <button onclick="addItem()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">บันทึกลง Cloud</button>
                </div>
            </div>

            <div class="flex bg-white rounded-xl p-1 shadow-sm border mb-4">
                <button onclick="switchTab('shopee')" id="tab-shopee" class="flex-1 py-3 text-xs font-bold rounded-lg transition-all bg-emerald-500 text-white">SHOPEE</button>
                <button onclick="switchTab('loan')" id="tab-loan" class="flex-1 py-3 text-xs font-bold rounded-lg transition-all">เงินกู้</button>
            </div>

            <div id="activeListContent" class="space-y-6"></div>
        </section>

        <section id="page-history" class="page-section">
            <div id="historyList" class="space-y-2"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex h-20 pb-4 z-50">
        <button onclick="switchPage('home', 'สรุปยอดเงิน')" class="flex-1 flex flex-col items-center justify-center text-emerald-500" id="nav-home">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold">สรุป</span>
        </button>
        <button onclick="switchPage('active', 'รายการค้าง')" class="flex-1 flex flex-col items-center justify-center text-slate-400" id="nav-active">
            <span class="text-xl">📝</span><span class="text-[10px] font-bold">รายการ</span>
        </button>
        <button onclick="switchPage('history', 'จบการผ่อน')" class="flex-1 flex flex-col items-center justify-center text-slate-400" id="nav-history">
            <span class="text-xl">✅</span><span class="text-[10px] font-bold">ประวัติ</span>
        </button>
    </nav>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2.5rem] max-w-md w-full p-8 shadow-2xl overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 id="mDebtor" class="text-2xl font-black text-slate-800"></h3>
                <button onclick="closeModal()" class="text-slate-300 text-4xl">&times;</button>
            </div>
            <div id="monthGrid" class="space-y-2 max-h-[50vh] overflow-y-auto pr-2"></div>
            <div class="mt-6 flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                <span class="text-slate-400 font-bold">จ่ายรวมแล้ว:</span>
                <span id="mTotalAmount" class="text-2xl font-black text-emerald-600">฿0</span>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 bg-slate-900 text-white py-4 rounded-xl font-bold">ปิด</button>
        </div>
    </div>

    <div id="pdf-container" class="hidden"><div id="pdf-content"></div></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuoGoCZ0IisovMTtrJmbwqL4gS_mSIRYiPINPJPCmqCkDLjpm2IfUgDJ4s6ZgGwVHq/exec"; 
        const ADMIN_PASS = "onlystar"; 
        let items = []; 
        let isAdmin = false; 
        let currentTab = 'shopee';

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                items = data || [];
                render(); 
            } catch (e) { alert("โหลดข้อมูลไม่สำเร็จ กรุณาเช็กเน็ตครับ"); }
        }

        function switchPage(pageId, title) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(n => n.classList.replace('text-emerald-500', 'text-slate-400'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.replace('text-slate-400', 'text-emerald-500');
            document.getElementById('currentTitle').innerText = title;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-shopee').className = `flex-1 py-3 text-xs font-bold rounded-lg transition-all ${tab==='shopee'?'bg-emerald-500 text-white':'text-slate-500'}`;
            document.getElementById('tab-loan').className = `flex-1 py-3 text-xs font-bold rounded-lg transition-all ${tab==='loan'?'bg-emerald-500 text-white':'text-slate-500'}`;
            render();
        }

        function render() {
            const activeList = document.getElementById('activeListContent');
            const historyList = document.getElementById('historyList');
            const summaryArea = document.getElementById('monthlySummaryArea');
            
            activeList.innerHTML = ''; historyList.innerHTML = ''; summaryArea.innerHTML = '';

            // 1. หน้าสรุป (Dashboard) - รวบรวมยอดรายคนจากทุกหมวด
            let grandTotal = 0;
            const summaryData = {};

            items.forEach(item => {
                const nextPay = item.payments.find(p => !p.isPaid);
                if (nextPay) {
                    summaryData[item.debtor] = (summaryData[item.debtor] || 0) + nextPay.amount;
                    grandTotal += nextPay.amount;
                }
            });

            document.getElementById('totalMonthlyAmount').innerText = `฿${Math.round(grandTotal).toLocaleString()}`;
            
            // แสดงรายชื่อในหน้าสรุป
            Object.keys(summaryData).forEach(name => {
                summaryArea.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center">
                        <span class="font-bold text-slate-600">คุณ${name}</span>
                        <span class="font-black text-slate-800 text-lg">฿${Math.round(summaryData[name]).toLocaleString()}</span>
                    </div>`;
            });

            // 2. รายการค้าง (แยกตามคนใน Tab)
            const activeItems = items.filter(i => i.payments.some(p => !p.isPaid) && i.cat === currentTab);
            const groups = activeItems.reduce((acc, curr) => {
                if(!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in groups) {
                let html = `<div class="bg-white rounded-3xl p-5 border shadow-sm mb-4">
                    <h3 class="font-black text-slate-800 border-b pb-2 mb-3">👤 คุณ${name}</h3>
                    <div class="space-y-3">`;
                groups[name].forEach(p => html += renderCard(p));
                html += `</div></div>`;
                activeList.innerHTML += html;
            }

            // 3. หน้าประวัติ
            items.filter(i => i.payments.every(p => p.isPaid)).forEach(p => historyList.innerHTML += renderCard(p));
            
            renderNameTags();
        }

        function renderCard(p) {
            const paidCount = p.payments.filter(m => m.isPaid).length;
            const percent = Math.round((paidCount / p.totalMonths) * 100);
            const hasReport = p.payments.some(m => m.reported && !m.isPaid);

            return `
                <div class="flex items-center gap-3">
                    <div onclick="openModal(${p.id})" class="flex-1 flex items-center gap-3 p-3 bg-slate-50 rounded-2xl cursor-pointer ${hasReport ? 'report-pending' : ''}">
                        <div class="w-1/4 font-bold text-[11px] text-slate-700 truncate">${hasReport ? '🚩 ' : ''}${p.item}</div>
                        <div class="flex-1">
                            <div class="progress-box">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                                <div class="progress-text">${percent}% (${paidCount}/${p.totalMonths})</div>
                            </div>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <button onclick="deleteItem(${p.id})" class="w-10 h-10 flex items-center justify-center border border-red-100 rounded-xl text-red-500 active:bg-red-500 active:text-white transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>` : ''}
                </div>`;
        }

        function renderNameTags() {
            const area = document.getElementById('nameTagsArea');
            const names = [...new Set(items.map(i => i.debtor))];
            area.innerHTML = names.map(n => `<div onclick="document.getElementById('debtorName').value='${n}'" class="px-3 py-1 bg-slate-100 rounded-full text-[10px] font-bold text-slate-500 cursor-pointer">${n}</div>`).join('');
        }

        function openModal(id) {
            const p = items.find(x => x.id === id);
            document.getElementById('mDebtor').innerText = p.debtor;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            let totalPaid = 0;

            p.payments.forEach((m, i) => {
                if(m.isPaid) totalPaid += m.amount;
                const statusClass = m.isPaid ? 'bg-emerald-50 border-emerald-200' : (m.reported ? 'bg-amber-50 border-amber-200' : 'bg-slate-50');
                grid.innerHTML += `
                    <div class="flex items-center gap-3 p-4 rounded-2xl border ${statusClass}">
                        <span class="text-[10px] font-bold text-slate-400 w-12 italic">งวด ${i+1}</span>
                        <input type="number" value="${m.amount}" ${!isAdmin ? 'disabled' : ''} onchange="updateAmt(${p.id}, ${i}, this.value)" class="flex-1 bg-transparent text-right font-black text-slate-700 outline-none">
                        <button onclick="togglePay(${p.id}, ${i})" ${!isAdmin && m.reported ? 'disabled' : ''} class="w-10 h-10 rounded-xl flex items-center justify-center transition ${m.isPaid ? 'bg-emerald-500 text-white' : 'bg-white border text-slate-200'}">
                            ${m.isPaid ? '✓' : (isAdmin ? '' : 'แจ้ง')}
                        </button>
                    </div>`;
            });
            document.getElementById('mTotalAmount').innerText = `฿${Math.round(totalPaid).toLocaleString()}`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function togglePay(id, idx) {
            const p = items.find(x => x.id === id);
            if (isAdmin) {
                p.payments[idx].isPaid = !p.payments[idx].isPaid;
                p.payments[idx].reported = false;
            } else {
                p.payments[idx].reported = true;
                alert("ส่งข้อมูลการชำระให้แอดมินแล้ว 🚩");
            }
            openModal(id);
            render();
            await saveCloud();
        }

        function updateAmt(id, idx, val) {
            items.find(x => x.id === id).payments[idx].amount = parseFloat(val) || 0;
        }

        async function addItem() {
            const name = document.getElementById('debtorName').value;
            const item = document.getElementById('itemName').value;
            const amt = document.getElementById('defaultAmount').value;
            const months = parseInt(document.getElementById('totalMonths').value);
            if(!name || !item || !amt) return alert("กรอกข้อมูลให้ครบ!");

            items.push({
                id: Date.now(), cat: document.getElementById('category').value,
                debtor: name, item: item, totalMonths: months,
                payments: Array.from({length: months}, () => ({isPaid: false, amount: parseFloat(amt), reported: false}))
            });
            render(); await saveCloud();
            document.getElementById('itemName').value = '';
        }

        async function deleteItem(id) {
            if(confirm("ลบถาวร?")) {
                items = items.filter(x => x.id !== id);
                render(); await saveCloud();
            }
        }

        async function saveCloud() {
            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(items) });
            } catch (e) {}
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); render(); }

        function loginAdmin() {
            const p = prompt("Password:");
            if (p === ADMIN_PASS) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminLock').innerText = "🔓";
                render();
            }
        }

        // PDF Generator (Fixed)
        function generatePDF(type) {
            const content = document.getElementById('pdf-content');
            let html = `<div style="font-family: 'Kanit'; padding: 20px;"><h2>รายงาน ${type.toUpperCase()}</h2>`;
            items.filter(i => i.cat === type && i.payments.some(p => !p.isPaid)).forEach(item => {
                const paid = item.payments.filter(m => m.isPaid).length;
                html += `<p><b>${item.debtor}</b> - ${item.item} (${paid}/${item.totalMonths} งวด)</p>`;
            });
            content.innerHTML = html + `</div>`;
            html2pdf().from(content).save(`Debt-${type}.pdf`);
        }

        window.onload = loadData;
    </script>
</body>
</html>
