<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzq29ZAeepeRhB2xfWzhocWrds1-f8nhyFtOkOzSyeENm8rIun_igIcl5Gqy0UrVeVe/exec"; 
    const ADMIN_PASS = "onlystar"; 
    let items = []; let isAdmin = false; let currentTab = 'shopee';
    let currentEditingId = null;
    let collapsedGroups = {}; 

    window.onscroll = function() {
        const btn = document.getElementById("scrollTopBtn");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.style.display = "flex";
        } else {
            btn.style.display = "none";
        }
    };

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ✅ FIX LOAD (กัน JSON พัง)
    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const text = await res.text();

            try {
                items = JSON.parse(text);
                if (!Array.isArray(items)) items = [];
            } catch (e) {
                console.error("JSON Parse Error:", e);
                items = [];
            }

            render();

        } catch (e) {
            console.error("Load Error:", e);
            items = [];
            render();
        }
    }

    function showSuccessToast() {
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
    }

    function switchPage(p, t) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => { b.classList.remove('text-pink-500'); b.classList.add('text-slate-400'); });
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('nav-'+p).classList.replace('text-slate-400', 'text-pink-500');
        document.getElementById('currentTitle').innerText = t;
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-shopee').className = `flex-1 py-3 text-[10px] font-bold rounded-full transition-all ${tab==='shopee'?'bg-white text-pink-600 shadow-sm':'text-blue-400'}`;
        document.getElementById('tab-loan').className = `flex-1 py-3 text-[10px] font-bold rounded-full transition-all ${tab==='loan'?'bg-white text-pink-600 shadow-sm':'text-blue-400'}`;
        render();
    }

    function toggleGroup(name) {
        collapsedGroups[name] = !collapsedGroups[name];
        render();
    }

    function generateMonthCheckboxes() {
        const mCount = parseInt(document.getElementById('monthCount').value);
        const container = document.getElementById('quickMonthSelect');
        if(!container) return;
        
        container.innerHTML = '';
        for (let i = 1; i <= mCount; i++) {
            container.innerHTML += `
                <label class="month-chip relative">
                    <input type="checkbox" class="quick-pay-check hidden" value="${i-1}" onchange="handleQuickPayLogic(${i-1}, this.checked)">
                    <div class="flex items-center justify-center py-2 rounded-xl bg-white border-2 border-slate-100 text-[11px] font-bold text-slate-400 transition-all cursor-pointer">
                        ${i}
                    </div>
                </label>
            `;
        }
    }

    function handleQuickPayLogic(index, isChecked) {
        const checkboxes = document.querySelectorAll('.quick-pay-check');
        checkboxes.forEach((cb, i) => {
            if (isChecked && i <= index) cb.checked = true;
            else if (!isChecked && i >= index) cb.checked = false;
        });
    }

    function render() {
        const activeList = document.getElementById('activeListContent');
        const historyList = document.getElementById('historyList');
        const summaryArea = document.getElementById('monthlySummaryArea');
        activeList.innerHTML = ''; historyList.innerHTML = ''; summaryArea.innerHTML = '';
        document.getElementById('globalPlusBtn').style.display = isAdmin ? 'flex' : 'none';

        let grandTotal = 0; const summaryData = {};
        items.forEach(i => {
            const nextPay = i.payments.find(p => !p.isPaid);
            if (nextPay) {
                summaryData[i.debtor] = (summaryData[i.debtor] || 0) + nextPay.amount;
                grandTotal += nextPay.amount;
            }
        });
        document.getElementById('totalMonthlyAmount').innerText = `฿${Math.round(grandTotal).toLocaleString()}`;
        
        Object.keys(summaryData).forEach(name => {
            summaryArea.innerHTML += `<div class="debt-card p-5 flex justify-between items-center border-l-4 border-l-blue-400"><span class="font-bold text-slate-700">คุณ${name}</span><span class="font-bold text-blue-600 text-lg">฿${Math.round(summaryData[name]).toLocaleString()}</span></div>`;
        });
    }

    async function addItem() {
        const n = document.getElementById('debtorName').value;
        const it = document.getElementById('itemName').value;
        const a = document.getElementById('defaultAmount').value;
        const cat = document.getElementById('category').value;
        const m = parseInt(document.getElementById('monthCount').value);
        
        if(!n || !it || !a) return alert("ข้อมูลไม่ครบ!");

        const checkedMonths = Array.from(document.querySelectorAll('.quick-pay-check:checked')).map(cb => parseInt(cb.value));
        
        items.push({ 
            id: Date.now(), 
            cat: cat, 
            debtor: n, 
            item: it, 
            payments: Array.from({length: m}, (_, index) => ({
                isPaid: checkedMonths.includes(index), 
                amount: parseFloat(a), 
                reported: false
            })) 
        });
        
        render();
        await saveCloud();
        showSuccessToast();
    }

    async function deleteItem(id) { 
        if(confirm("ลบรายการนี้?")) { 
            items = items.filter(x => x.id !== id); 
            render(); 
            await saveCloud(); 
        } 
    }

    // ✅ FIX SAVE (รู้ผลจริง + ไม่ no-cors)
    async function saveCloud() {
        try {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(items)
            });

            const text = await res.text();

            if (!text.includes("Success")) {
                console.error("Save failed:", text);
            }

        } catch (e) {
            console.error("Save Error:", e);
        }
    }

    function closeModal() { document.getElementById('detailModal').classList.add('hidden'); render(); }
    
    function loginAdmin() { 
        if (prompt("Admin Key:") === ADMIN_PASS) { 
            isAdmin = true; 
            document.getElementById('adminPanel').classList.remove('hidden'); 
            document.getElementById('adminLock').innerText = "🔓"; 
            generateMonthCheckboxes(); 
            render(); 
        } 
    }

    function renderNameTags() { 
        const area = document.getElementById('nameTagsArea'); 
        const names = [...new Set(items.map(i => i.debtor))]; 
        area.innerHTML = names.map(n => `<div onclick="document.getElementById('debtorName').value='${n}'" class="px-3 py-1 bg-white rounded-full text-[10px] font-bold text-pink-500 border border-pink-100 cursor-pointer">${n}</div>`).join(''); 
    }

    window.onload = loadData;
</script>
