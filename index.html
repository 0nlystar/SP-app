<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEBT CLOUD - EVO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600;800&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent: #10b981;
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-dark);
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent; 
        }
        .font-inter { font-family: 'Inter', sans-serif; }

        .page-section { display: none; transition: all 0.4s ease; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar สไตล์ใหม่ */
        .progress-box { 
            position: relative; 
            width: 100%; 
            height: 8px; 
            background: #334155; 
            border-radius: 99px; 
            overflow: hidden;
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #10b981, #34d399); 
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* Glassmorphism & Cards */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .debt-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .debt-card:active { transform: scale(0.97); background: rgba(16, 185, 129, 0.1); }
        
        .report-pending { border-left: 4px solid #fbbf24 !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Floating Nav */
        .floating-nav {
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="sticky top-0 bg-slate-900/80 backdrop-blur-md z-40 p-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-500/20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
                <h1 class="font-black text-xl tracking-tighter text-white" id="currentTitle">SUMMARY</h1>
                <div class="text-[10px] text-emerald-500 font-bold uppercase tracking-[0.2em] leading-none">Debt Cloud Evo</div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="generatePDF('shopee')" class="p-2 bg-orange-500/10 text-orange-500 rounded-lg border border-orange-500/20 text-[10px] font-bold">SHOPEE</button>
            <button onclick="generatePDF('loan')" class="p-2 bg-blue-500/10 text-blue-500 rounded-lg border border-blue-500/20 text-[10px] font-bold">LOAN</button>
            <button onclick="loginAdmin()" id="adminLock" class="bg-slate-800 p-2 rounded-lg border border-white/5 shadow-inner">🔒</button>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-5">
        <section id="page-home" class="page-section active">
            <div class="relative overflow-hidden bg-gradient-to-br from-slate-800 to-slate-950 rounded-[2.5rem] p-10 text-center shadow-2xl mb-8 border border-white/5">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-500/10 blur-3xl rounded-full"></div>
                <p class="text-emerald-500 text-[11px] font-black uppercase tracking-[0.3em] mb-2">Total Monthly Collection</p>
                <div id="totalMonthlyAmount" class="text-5xl font-black font-inter italic tracking-tighter text-white">฿0</div>
            </div>
            <div id="monthlySummaryArea" class="space-y-4"></div>
        </section>

        <section id="page-active" class="page-section">
            <div id="adminPanel" class="hidden mb-8 glass-card p-6 rounded-[2rem] shadow-2xl border border-emerald-500/20">
                <div id="nameTagsArea" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="space-y-3">
                    <input type="text" id="debtorName" placeholder="ชื่อลูกหนี้" class="w-full p-4 bg-slate-950/50 rounded-2xl outline-none border border-white/5 focus:border-emerald-500 transition-all text-white">
                    <input type="text" id="itemName" placeholder="รายการสินค้า/กู้" class="w-full p-4 bg-slate-950/50 rounded-2xl outline-none border border-white/5 focus:border-emerald-500 transition-all text-white">
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 p-4 bg-slate-800 rounded-2xl font-bold text-white border-none">
                            <option value="shopee">Shopee</option>
                            <option value="loan">เงินกู้</option>
                        </select>
                        <input type="number" id="defaultAmount" placeholder="ยอด/งวด" class="flex-1 p-4 bg-slate-950/50 rounded-2xl font-black text-center text-emerald-500">
                        <select id="totalMonths" class="w-24 p-4 bg-slate-800 rounded-2xl font-bold text-white border-none">
                            <option value="1">1</option><option value="3">3</option><option value="6">6</option><option value="12" selected>12</option>
                        </select>
                    </div>
                    <button onclick="addItem()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/20 transition-all uppercase tracking-widest">Add to Cloud</button>
                </div>
            </div>

            <div class="flex bg-slate-900/50 p-1.5 rounded-2xl border border-white/5 mb-6 shadow-inner">
                <button onclick="switchTab('shopee')" id="tab-shopee" class="flex-1 py-3 text-xs font-black rounded-xl transition-all bg-emerald-500 text-slate-900 shadow-lg">SHOPEE</button>
                <button onclick="switchTab('loan')" id="tab-loan" class="flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-400">LOAN</button>
            </div>

            <div id="activeListContent" class="space-y-8"></div>
        </section>

        <section id="page-history" class="page-section">
            <div id="historyList" class="space-y-3 opacity-80"></div>
        </section>
    </main>

    <nav class="fixed floating-nav flex h-16 px-2 z-50 backdrop-blur-xl">
        <button onclick="switchPage('home', 'SUMMARY')" class="flex-1 flex flex-col items-center justify-center text-emerald-500" id="nav-home">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Home</span>
        </button>
        <button onclick="switchPage('active', 'รายการค้าง')" class="flex-1 flex flex-col items-center justify-center text-slate-500" id="nav-active">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">List</span>
        </button>
        <button onclick="switchPage('history', 'จบการผ่อน')" class="flex-1 flex flex-col items-center justify-center text-slate-500" id="nav-history">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">History</span>
        </button>
    </nav>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-end sm:items-center justify-center z-[60]">
        <div class="bg-slate-900 rounded-t-[3rem] sm:rounded-[3rem] max-w-md w-full p-8 shadow-2xl border-t border-white/10 relative">
            <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
            <div class="flex justify-between items-start mb-8">
                <div>
                    <div id="mDebtorSub" class="text-emerald-500 font-bold text-xs tracking-widest uppercase mb-1"></div>
                    <h3 id="mItemTitle" class="text-3xl font-black text-white leading-none"></h3>
                </div>
                <button onclick="closeModal()" class="text-slate-500 bg-slate-800 w-10 h-10 rounded-full flex items-center justify-center text-2xl">&times;</button>
            </div>
            
            <div id="monthGrid" class="space-y-3 max-h-[45vh] overflow-y-auto pr-2"></div>
            
            <div class="mt-8 flex justify-between items-center p-6 bg-slate-950/50 rounded-[2rem] border border-white/5">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Paid Total</span>
                <span id="mTotalAmount" class="text-3xl font-black text-emerald-500 font-inter">฿0</span>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 bg-white text-slate-900 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest text-sm">Dismiss</button>
        </div>
    </div>

    <div id="pdf-container" class="hidden"><div id="pdf-content"></div></div>

    <script>
        // --- ส่วน Logic เหมือนเดิมทั้งหมด (ไม่ได้เปลี่ยน Function Name เพื่อให้ใช้งานกับระบบเดิมได้) ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuoGoCZ0IisovMTtrJmbwqL4gS_mSIRYiPINPJPCmqCkDLjpm2IfUgDJ4s6ZgGwVHq/exec"; 
        const ADMIN_PASS = "onlystar"; 
        let items = []; 
        let isAdmin = false; 
        let currentTab = 'shopee';

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                items = data || [];
                render(); 
            } catch (e) { console.error(e); }
        }

        function switchPage(pageId, title) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(n => {
                n.classList.remove('text-emerald-500');
                n.classList.add('text-slate-500');
            });
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.replace('text-slate-500', 'text-emerald-500');
            document.getElementById('currentTitle').innerText = title;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-shopee').className = `flex-1 py-3 text-xs font-black rounded-xl transition-all ${tab==='shopee'?'bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/20':'text-slate-500'}`;
            document.getElementById('tab-loan').className = `flex-1 py-3 text-xs font-black rounded-xl transition-all ${tab==='loan'?'bg-emerald-500 text-slate-900 shadow-lg shadow-emerald-500/20':'text-slate-500'}`;
            render();
        }

        function render() {
            const activeList = document.getElementById('activeListContent');
            const historyList = document.getElementById('historyList');
            const summaryArea = document.getElementById('monthlySummaryArea');
            activeList.innerHTML = ''; historyList.innerHTML = ''; summaryArea.innerHTML = '';

            let grandTotal = 0;
            const summaryData = {};
            items.forEach(item => {
                const nextPay = item.payments.find(p => !p.isPaid);
                if (nextPay) {
                    summaryData[item.debtor] = (summaryData[item.debtor] || 0) + nextPay.amount;
                    grandTotal += nextPay.amount;
                }
            });
            document.getElementById('totalMonthlyAmount').innerText = `฿${Math.round(grandTotal).toLocaleString()}`;
            
            Object.keys(summaryData).forEach(name => {
                summaryArea.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl flex justify-between items-center border border-white/5 shadow-xl">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span class="font-bold text-slate-300">คุณ${name}</span>
                        </div>
                        <span class="font-black text-white text-xl font-inter">฿${Math.round(summaryData[name]).toLocaleString()}</span>
                    </div>`;
            });

            const activeItems = items.filter(i => i.payments.some(p => !p.isPaid) && i.cat === currentTab);
            const groups = activeItems.reduce((acc, curr) => {
                if(!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in groups) {
                let html = `<div class="mb-2">
                    <h3 class="font-black text-[10px] text-slate-500 uppercase tracking-[0.2em] mb-3 ml-2 flex items-center gap-2">
                        <span class="w-8 h-[1px] bg-slate-800"></span> 👤 CLIENT: ${name}
                    </h3>
                    <div class="space-y-3">`;
                groups[name].forEach(p => html += renderCard(p));
                html += `</div></div>`;
                activeList.innerHTML += html;
            }
            items.filter(i => i.payments.every(p => p.isPaid)).forEach(p => historyList.innerHTML += renderCard(p));
            renderNameTags();
        }

        function renderCard(p) {
            const paidCount = p.payments.filter(m => m.isPaid).length;
            const percent = Math.round((paidCount / p.totalMonths) * 100);
            const hasReport = p.payments.some(m => m.reported && !m.isPaid);

            return `
                <div class="flex items-center gap-3 group">
                    <div onclick="openModal(${p.id})" 
                         class="debt-card glass-card flex-1 flex items-center gap-4 p-4 rounded-2xl cursor-pointer ${hasReport ? 'report-pending' : ''}">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-end mb-2">
                                <div class="font-black text-sm text-white truncate pr-2 uppercase tracking-tight">${hasReport ? '<span class="text-yellow-500">!</span> ' : ''}${p.item}</div>
                                <div class="text-[10px] font-black text-slate-500 font-inter">${percent}%</div>
                            </div>
                            <div class="progress-box">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <button onclick="deleteItem(${p.id})" class="w-12 h-14 flex items-center justify-center bg-red-500/10 rounded-2xl text-red-500 border border-red-500/20 active:bg-red-500 active:text-white transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>` : ''}
                </div>`;
        }

        function openModal(id) {
            const p = items.find(x => x.id === id);
            document.getElementById('mDebtorSub').innerText = `ACCOUNT: ${p.debtor}`;
            document.getElementById('mItemTitle').innerText = p.item;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            let totalPaid = 0;

            p.payments.forEach((m, i) => {
                if(m.isPaid) totalPaid += m.amount;
                const statusClass = m.isPaid ? 'bg-emerald-500/20 border-emerald-500/40 text-emerald-400' : (m.reported ? 'bg-amber-500/20 border-amber-500/40 text-amber-400' : 'bg-slate-800/50 border-white/5 text-slate-400');
                grid.innerHTML += `
                    <div class="flex items-center gap-4 p-4 rounded-2xl border ${statusClass} transition-all">
                        <span class="text-[9px] font-black uppercase w-10">งวด ${i+1}</span>
                        <input type="number" value="${m.amount}" ${!isAdmin ? 'disabled' : ''} onchange="updateAmt(${p.id}, ${i}, this.value)" class="flex-1 bg-transparent text-right font-black outline-none font-inter text-white">
                        <button onclick="togglePay(${p.id}, ${i})" ${!isAdmin && m.reported ? 'disabled' : ''} class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg transition-all ${m.isPaid ? 'bg-emerald-500 text-slate-900' : 'bg-slate-700 text-white active:scale-90'}">
                            ${m.isPaid ? '✓' : (isAdmin ? '⚬' : '🔔')}
                        </button>
                    </div>`;
            });
            document.getElementById('mTotalAmount').innerText = `฿${Math.round(totalPaid).toLocaleString()}`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function togglePay(id, idx) {
            const p = items.find(x => x.id === id);
            if (isAdmin) {
                p.payments[idx].isPaid = !p.payments[idx].isPaid;
                p.payments[idx].reported = false;
            } else {
                p.payments[idx].reported = true;
                alert("REPORTED TO ADMIN 🚩");
            }
            openModal(id); render(); await saveCloud();
        }

        function updateAmt(id, idx, val) {
            items.find(x => x.id === id).payments[idx].amount = parseFloat(val) || 0;
            saveCloud();
        }

        async function addItem() {
            const name = document.getElementById('debtorName').value;
            const item = document.getElementById('itemName').value;
            const amt = document.getElementById('defaultAmount').value;
            const months = parseInt(document.getElementById('totalMonths').value);
            if(!name || !item || !amt) return alert("กรอกข้อมูลให้ครบ!");

            items.push({
                id: Date.now(), cat: document.getElementById('category').value,
                debtor: name, item: item, totalMonths: months,
                payments: Array.from({length: months}, () => ({isPaid: false, amount: parseFloat(amt), reported: false}))
            });
            render(); await saveCloud();
            document.getElementById('itemName').value = '';
        }

        async function deleteItem(id) {
            if(confirm("DELETE THIS ITEM PERMANENTLY?")) {
                items = items.filter(x => x.id !== id);
                render(); await saveCloud();
            }
        }

        async function saveCloud() {
            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(items) });
            } catch (e) { console.error("Cloud Save Error"); }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); render(); }

        function loginAdmin() {
            const p = prompt("ENTER ADMIN KEY:");
            if (p === ADMIN_PASS) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminLock').innerHTML = "🔓";
                document.getElementById('adminLock').classList.replace('bg-slate-800', 'bg-emerald-500');
                render();
            }
        }

        function renderNameTags() {
            const area = document.getElementById('nameTagsArea');
            const names = [...new Set(items.map(i => i.debtor))];
            area.innerHTML = names.map(n => `<div onclick="document.getElementById('debtorName').value='${n}'" class="px-4 py-2 bg-slate-800 rounded-full text-[10px] font-black text-slate-400 cursor-pointer hover:bg-emerald-500 hover:text-slate-900 transition-all uppercase tracking-tighter">${n}</div>`).join('');
        }

        // --- PDF Logic คงเดิมตามคำขอ ---
        function generatePDF(type) {
            const content = document.getElementById('pdf-content');
            const today = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            const filteredItems = items.filter(i => i.cat === type && i.payments.some(p => !p.isPaid));
            if (filteredItems.length === 0) { alert("ไม่มีข้อมูลค้างชำระในหมวดนี้"); return; }

            let html = `<div style="font-family: 'Kanit', sans-serif; padding: 40px; background: #fff; color: #334155;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid ${type === 'shopee' ? '#f97316' : '#3b82f6'}; padding-bottom: 20px; margin-bottom: 30px;">
                    <div>
                        <h1 style="margin: 0; font-size: 28px; color: ${type === 'shopee' ? '#ea580c' : '#2563eb'};">รายงานค้างชำระ: ${type.toUpperCase()}</h1>
                        <p style="margin: 5px 0 0 0; opacity: 0.7;">ประจำวันที่ ${today}</p>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: bold; font-size: 18px;">DEBT CLOUD</div>
                        <div style="font-size: 12px; opacity: 0.6;">ระบบจัดการบัญชีไฮบริด</div>
                    </div>
                </div>`;

            const grouped = filteredItems.reduce((acc, curr) => {
                if (!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in grouped) {
                let personTotal = 0;
                html += `<div style="margin-bottom: 40px; border: 1px solid #e2e8f0; border-radius: 15px; overflow: hidden; page-break-inside: avoid;">
                    <div style="background: #f8fafc; padding: 15px 20px; border-bottom: 1px solid #e2e8f0;"><span style="font-weight: bold; font-size: 18px;">👤 คุณ${name}</span></div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead><tr style="background: #ffffff; text-align: left; font-size: 13px; color: #64748b;">
                            <th style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9;">รายการ</th>
                            <th style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; text-align: center;">ความคืบหน้า</th>
                            <th style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; text-align: right;">ยอดต้องชำระงวดนี้</th>
                        </tr></thead><tbody>`;

                grouped[name].forEach(item => {
                    const nextPay = item.payments.find(p => !p.isPaid);
                    const paidCount = item.payments.filter(p => p.isPaid).length;
                    const amount = nextPay ? nextPay.amount : 0;
                    personTotal += amount;
                    html += `<tr style="font-size: 14px; border-bottom: 1px solid #f8fafc;">
                        <td style="padding: 15px 20px;"><div style="font-weight: 600;">${item.item}</div></td>
                        <td style="padding: 15px 20px; text-align: center;"><span style="font-size: 11px;">${paidCount}/${item.totalMonths} งวด</span></td>
                        <td style="padding: 15px 20px; text-align: right; font-weight: bold;">฿${Math.round(amount).toLocaleString()}</td>
                    </tr>`;
                });
                html += `</tbody></table>
                <div style="background: #fffcf0; padding: 15px 20px; text-align: right; border-top: 2px dashed #e2e8f0;">
                    <span style="font-size: 13px; font-weight: bold;">รวมของเดือนนี้: </span>
                    <span style="font-size: 20px; font-weight: 900;">฿${Math.round(personTotal).toLocaleString()}</span>
                </div></div>`;
            }
            html += `<div style="margin-top: 50px; text-align: center; font-size: 11px; color: #94a3b8;">เอกสารนี้สร้างโดยระบบอัตโนมัติ - Debt Cloud</div></div>`;
            content.innerHTML = html;
            const opt = { margin: [0.5, 0.5], filename: `Debt-${type}.pdf`, html2canvas: { scale: 3 }, jsPDF: { unit: 'in', format: 'a4' } };
            html2pdf().set(opt).from(content).save();
        }

        window.onload = loadData;
    </script>
</body>
</html>
