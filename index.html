<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Cloud Manager Pro (Notification System)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .admin-only { display: none; }
        .name-tag { cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .name-tag:hover { background-color: #10b981; color: white; border-color: #10b981; transform: translateY(-1px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-input:disabled { background-color: transparent; border-color: transparent; color: #333; }
        
        /* สไตล์แจ้งเตือนสีเหลือง */
        @keyframes pulse-yellow {
            0% { background-color: #fffbeb; }
            50% { background-color: #fef3c7; }
            100% { background-color: #fffbeb; }
        }
        .report-pending { animation: pulse-yellow 2s infinite; border-left: 5px solid #f59e0b !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div class="max-w-[1600px] mx-auto p-4 md:p-6">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm gap-4 border-b-4 border-emerald-500">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">ระบบติดตามหนี้ (Cloud Sync)</h1>
                <p id="userStatus" class="text-emerald-600 text-sm font-bold italic">โหมด: ผู้เข้าชม (ดูได้อย่างเดียว)</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loginAdmin()" id="loginBtn" class="bg-gray-800 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-black transition shadow-md">🔑 เข้าโหมดแอดมิน</button>
                <button onclick="generatePDF('shopee')" class="bg-orange-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md">📥 PDF Shopee</button>
                <button onclick="generatePDF('loan')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md">📥 PDF เงินกู้</button>
            </div>
        </header>

        <div class="mb-8 bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
                <div class="w-2 h-6 bg-emerald-500 rounded-full"></div> ยอดที่ต้องเรียกเก็บเดือนนี้
            </h2>
            <div id="monthlySummaryArea" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="adminArea" class="admin-only space-y-4 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-emerald-500">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                    <h3 class="font-bold text-emerald-700">➕ เพิ่มข้อมูลใหม่ (Admin Only)</h3>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="payAllNextMonth('shopee')" class="bg-orange-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-orange-600 shadow-md">✅ จ่าย Shopee ทุกคน</button>
                        <button onclick="payAllNextMonth('loan')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 shadow-md">✅ จ่ายเงินกู้ทุกคน</button>
                    </div>
                </div>
                <div class="mb-5">
                    <div id="nameTagsArea" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto custom-scrollbar p-1"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-6 gap-3">
                    <select id="category" class="border p-3 rounded-2xl bg-gray-50 outline-none">
                        <option value="shopee">🛒 Shopee</option>
                        <option value="loan">💵 เงินกู้</option>
                    </select>
                    <input type="text" id="debtorName" placeholder="ชื่อลูกหนี้" class="border p-3 rounded-2xl bg-gray-50 outline-none font-bold text-blue-600">
                    <input type="text" id="itemName" placeholder="รายการสินค้า" class="border p-3 rounded-2xl bg-gray-50 outline-none">
                    <input type="number" id="defaultAmount" placeholder="ยอดต่องวด (฿)" class="border p-3 rounded-2xl bg-gray-50 outline-none font-bold text-emerald-700">
                    <select id="totalMonths" class="border p-3 rounded-2xl bg-gray-50 outline-none">
                        <option value="1">1 เดือน</option>
                        <option value="3">3 เดือน</option>
                        <option value="6">6 เดือน</option>
                        <option value="12" selected>12 เดือน</option>
                        <option value="24">24 เดือน</option>
                    </select>
                    <button onclick="addItem()" class="bg-emerald-500 text-white font-bold rounded-2xl py-3 hover:bg-emerald-600 shadow-lg">เพิ่มข้อมูล</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">
            <div class="bg-white rounded-3xl shadow-sm border border-orange-100 overflow-hidden">
                <div class="bg-orange-500 p-4 text-white font-bold flex justify-between items-center hover:bg-orange-600 cursor-pointer" onclick="toggleTable('shopee')">
                    <span>🛒 รายการ Shopee</span>
                    <span id="shopeeIcon">▼</span>
                </div>
                <div id="shopeeTableArea" class="overflow-x-auto"><table class="w-full text-sm"><tbody id="shopeeTableBody"></tbody></table></div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border border-blue-100 overflow-hidden">
                <div class="bg-blue-600 p-4 text-white font-bold flex justify-between items-center hover:bg-blue-700 cursor-pointer" onclick="toggleTable('loan')">
                    <span>💵 รายการ เงินกู้</span>
                    <span id="loanIcon">▼</span>
                </div>
                <div id="loanTableArea" class="overflow-x-auto"><table class="w-full text-sm"><tbody id="loanTableBody"></tbody></table></div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden opacity-90">
            <div class="bg-gray-700 p-4 text-white font-bold">✅ รายการที่ชำระครบแล้ว (Archive)</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead id="historyHeader" class="bg-gray-50 text-gray-500 border-b"></thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl max-w-md w-full p-6 shadow-2xl transition-all scale-95 opacity-0 duration-300" id="modalContent">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h3 id="mDebtor" class="text-xl font-bold text-gray-800"></h3>
                    <p id="mItem" class="text-xs text-gray-500 italic"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-400 text-3xl hover:text-gray-600">&times;</button>
            </div>
            <div id="monthGrid" class="space-y-3 max-h-[40vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            <div class="mt-6 p-4 bg-green-50 rounded-2xl flex justify-between items-center font-bold text-green-700 border border-green-100">
                <span>ยอดรวมจ่ายแล้ว:</span><span id="mTotalAmount" class="text-xl">฿0</span>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 bg-gray-800 text-white py-3 rounded-2xl font-bold shadow-lg">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="pdf-container" class="hidden"><div id="pdf-content"></div></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuoGoCZ0IisovMTtrJmbwqL4gS_mSIRYiPINPJPCmqCkDLjpm2IfUgDJ4s6ZgGwVHq/exec"; 
        const ADMIN_PASS = "onlystar"; 

        let items = [];
        let isAdmin = false;

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const rawData = await res.text();
                if (rawData) { items = JSON.parse(rawData); render(); }
            } catch (e) { console.error("Load failed", e); }
        }

        function loginAdmin() {
            const pass = prompt("รหัสผ่าน Admin:");
            if (pass === ADMIN_PASS) {
                isAdmin = true;
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('userStatus').innerText = "โหมด: แอดมิน";
                document.getElementById('userStatus').classList.replace('text-emerald-600', 'text-red-600');
                document.getElementById('loginBtn').style.display = 'none';
                render();
            } else if(pass !== null) { alert("ผิดครับ!"); }
        }

        function render() {
            const shopeeBody = document.getElementById('shopeeTableBody');
            const loanBody = document.getElementById('loanTableBody');
            const historyBody = document.getElementById('historyTableBody');
            const historyHeader = document.getElementById('historyHeader');
            
            shopeeBody.innerHTML = ''; loanBody.innerHTML = ''; historyBody.innerHTML = '';
            historyHeader.innerHTML = `<tr><th class="p-4 text-left">ลูกหนี้</th><th class="p-4 text-left">หมวด</th><th class="p-4 text-center">งวด</th><th class="p-4 text-right">ยอดจ่าย</th>${isAdmin ? '<th class="p-4 text-center">ลบ</th>' : ''}</tr>`;

            items.forEach(p => {
                const paidCount = p.payments.filter(m => m.isPaid).length;
                const paidSum = p.payments.reduce((s, m) => m.isPaid ? s + m.amount : s, 0);
                const percent = Math.round((paidCount / p.totalMonths) * 100);
                const isCompleted = paidCount === p.totalMonths;
                
                // ⭐ เช็กว่ามีการแจ้ง Report ในรายการนี้หรือไม่
                const hasReport = p.payments.some(m => m.reported && !m.isPaid);
                const reportClass = (hasReport && !isCompleted) ? 'report-pending' : '';
                const reportIcon = (hasReport && !isCompleted) ? '⚠️ ' : '';

                const deleteBtn = isAdmin ? `<td class="p-4 text-center text-red-300 hover:text-red-600" onclick="event.stopPropagation(); deleteItem(${p.id})">✕</td>` : '';

                if (isCompleted) {
                    historyBody.innerHTML += `<tr class="border-b bg-gray-50/50 hover:bg-white cursor-pointer" onclick="openModal(${p.id})">
                        <td class="p-4 font-bold text-gray-600">${p.debtor} <span class="block font-normal text-[10px]">${p.item}</span></td>
                        <td class="p-4 text-[10px] font-bold text-gray-400 uppercase">${p.cat}</td>
                        <td class="p-4 text-center font-bold text-emerald-600">${paidCount}/${p.totalMonths}</td>
                        <td class="p-4 text-right font-bold text-emerald-600">฿${Math.round(paidSum).toLocaleString()}</td>
                        ${deleteBtn}
                    </tr>`;
                } else {
                    const row = `<tr class="border-b hover:bg-gray-50 cursor-pointer ${reportClass}" onclick="openModal(${p.id})">
                        <td class="p-4 font-bold text-gray-700">${reportIcon}${p.debtor} <span class="block font-normal text-[10px] text-gray-400">${p.item}</span></td>
                        <td class="p-4"><div class="text-[10px] font-bold mb-1">${paidCount}/${p.totalMonths} (${percent}%)</div>
                            <div class="w-full bg-gray-100 h-1 rounded-full"><div class="${p.cat==='shopee'?'bg-orange-500':'bg-blue-600'} h-1 rounded-full" style="width: ${percent}%"></div></div></td>
                        <td class="p-4 text-right font-bold text-gray-600">฿${Math.round(paidSum).toLocaleString()}</td>
                        ${deleteBtn}
                    </tr>`;
                    if(p.cat === 'shopee') shopeeBody.innerHTML += row; else loanBody.innerHTML += row;
                }
            });
            updateSummary();
            renderNameTags();
        }

        function renderNameTags() {
            const area = document.getElementById('nameTagsArea');
            if (!isAdmin) return;
            const names = [...new Set(items.map(item => item.debtor))].sort();
            area.innerHTML = names.map(name => `<button onclick="selectDebtor('${name}')" class="name-tag px-3 py-1 rounded-full bg-white text-xs font-semibold text-gray-600 shadow-sm">${name}</button>`).join('');
        }

        function selectDebtor(name) { document.getElementById('debtorName').value = name; }

        function updateSummary() {
            const area = document.getElementById('monthlySummaryArea'); 
            area.innerHTML = '';
            const debtorGroups = items.reduce((acc, curr) => {
                const nextPayment = curr.payments.find(p => !p.isPaid);
                if (nextPayment) acc[curr.debtor] = (acc[curr.debtor] || 0) + (nextPayment.amount || 0);
                return acc;
            }, {});
            for (const name in debtorGroups) {
                area.innerHTML += `<div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 shadow-sm">
                    <div class="text-xs text-emerald-600 font-bold">คุณ${name}</div>
                    <div class="text-lg font-bold text-emerald-900">฿${Math.round(debtorGroups[name]).toLocaleString()}</div>
                </div>`;
            }
        }

        async function addItem() {
            if (!isAdmin) return;
            const debtor = document.getElementById('debtorName').value.trim();
            const item = document.getElementById('itemName').value.trim();
            const amount = document.getElementById('defaultAmount').value;
            const months = parseInt(document.getElementById('totalMonths').value);
            if (!debtor || !item || !amount) return alert("กรอกข้อมูลให้ครบ");

            items.push({ 
                id: Date.now(), cat: document.getElementById('category').value, 
                debtor, item, totalMonths: months, 
                payments: Array.from({length: months}, () => ({isPaid: false, amount: parseFloat(amount), reported: false})) 
            });
            render(); await saveCloud();
            document.getElementById('itemName').value = ''; document.getElementById('defaultAmount').value = '';
        }

        function openModal(id) {
            const p = items.find(x => x.id === id);
            document.getElementById('mDebtor').innerText = p.debtor;
            document.getElementById('mItem').innerText = p.item;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            let sum = 0;
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10);

            p.payments.forEach((m, i) => {
                if(m.isPaid) sum += m.amount;
                
                // ⭐ ปุ่ม Report (แสดงเฉพาะคนที่ยังไม่จ่าย และไม่ได้อยู่ในโหมดแอดมิน)
                const reportBtn = (!m.isPaid && !isAdmin) ? 
                    `<button onclick="reportPay(${p.id},${i})" class="px-2 py-1 text-[10px] rounded-lg ${m.reported ? 'bg-orange-100 text-orange-600' : 'bg-gray-100 text-gray-400 hover:bg-orange-500 hover:text-white'} transition font-bold">${m.reported ? '🚩 แจ้งแล้ว' : '🚩 แจ้งชำระ'}</button>` : '';
                
                // ⭐ สถานะสีเหลืองใน Modal แอดมิน
                const statusClass = (m.reported && !m.isPaid) ? 'bg-amber-50 border-amber-200' : (m.isPaid ? 'bg-emerald-50 border-emerald-100' : 'bg-gray-50 border-gray-100');

                grid.innerHTML += `<div class="flex items-center gap-2 p-2 rounded-xl border ${statusClass}">
                    <span class="text-[10px] w-12 text-gray-400 font-bold italic">งวด ${i+1}</span>
                    <input type="number" value="${m.amount || ''}" ${!isAdmin ? 'disabled' : ''} onchange="updateAmt(${p.id},${i},this.value)" class="modal-input flex-1 text-sm p-1.5 rounded-lg border outline-none font-bold text-right pr-4">
                    ${reportBtn}
                    <button onclick="togglePay(${p.id},${i})" ${!isAdmin ? 'disabled' : ''} class="w-10 h-10 rounded-xl transition ${m.isPaid ? 'bg-emerald-500 text-white shadow-md' : 'bg-white text-gray-300 border'}">${m.isPaid ? '✓' : ''}</button>
                </div>`;
            });
            document.getElementById('mTotalAmount').innerText = `฿${Math.round(sum).toLocaleString()}`;
        }

        // ⭐ ฟังก์ชันแจ้ง Report
        async function reportPay(id, idx) {
            const p = items.find(x => x.id === id);
            p.payments[idx].reported = !p.payments[idx].reported;
            openModal(id);
            render();
            await saveCloud();
        }

        function updateAmt(id, idx, val) { const i = items.find(x => x.id === id); i.payments[idx].amount = Math.round(parseFloat(val) || 0); }
        
        function togglePay(id, idx) { 
            const i = items.find(x => x.id === id); 
            i.payments[idx].isPaid = !i.payments[idx].isPaid; 
            if(i.payments[idx].isPaid) i.payments[idx].reported = false; // จ่ายแล้วให้ยกเลิก Report
            openModal(id); 
        }

        async function closeModal() { 
            const content = document.getElementById('modalContent');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('detailModal').classList.add('hidden'); render(); if(isAdmin) saveCloud(); }, 300);
        }

        async function deleteItem(id) { if (isAdmin && confirm('ลบ?')) { items = items.filter(x => x.id !== id); render(); await saveCloud(); } }
        async function saveCloud() { try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(items) }); } catch (e) { console.error(e); } }
        function toggleTable(cat) { const area = document.getElementById(`${cat}TableArea`); const icon = document.getElementById(`${cat}Icon`); area.style.display = (area.style.display === "none") ? "block" : "none"; icon.innerText = (area.style.display === "none") ? "▶" : "▼"; }

        function generatePDF(category) {
            const filtered = items.filter(i => i.cat === category && i.payments.some(p => !p.isPaid));
            if(filtered.length === 0) return alert("ไม่มีข้อมูล");
            const grouped = filtered.reduce((groups, item) => {
                const name = item.debtor;
                if (!groups[name]) groups[name] = [];
                groups[name].push(item);
                return groups;
            }, {});
            const area = document.getElementById('pdf-content');
            const color = category === 'shopee' ? '#f97316' : '#2563eb';
            let contentHtml = `<div style="font-family: 'Kanit', sans-serif; padding: 20px;"><div style="text-align: center; border-bottom: 3px solid ${color}; padding-bottom: 15px; margin-bottom: 20px;"><h1 style="color: ${color}; margin: 0;">รายงาน: ${category.toUpperCase()}</h1><p style="font-size: 12px; color: #666;">วันที่: ${new Date().toLocaleDateString('th-TH')}</p></div>`;
            for (const name in grouped) {
                let pTotal = 0; let rows = '';
                grouped[name].forEach((p, idx) => {
                    const paidSum = p.payments.reduce((s, m) => m.isPaid ? s + m.amount : s, 0);
                    pTotal += paidSum;
                    rows += `<tr style="background: ${idx%2===0?'#fff':'#f8fafc'}; border-bottom: 1px solid #eee;"><td style="padding: 10px;">${p.item}</td><td style="padding: 10px; text-align: center;">${p.payments.filter(m=>m.isPaid).length}/${p.totalMonths}</td><td style="padding: 10px; text-align: right;">฿${Math.round(paidSum).toLocaleString()}</td></tr>`;
                });
                contentHtml += `<div style="margin-bottom: 30px; break-inside: avoid;"><div style="background: ${color}; color: white; padding: 8px 15px; border-radius: 5px 5px 0 0;">👤 คุณ${name}</div><table style="width: 100%; border-collapse: collapse;"><thead><tr style="background: #f1f5f9;"><th>รายการ</th><th>งวด</th><th style="text-align: right;">จ่ายแล้ว</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="2" style="text-align: right; padding: 10px;">รวมจ่ายแล้ว:</td><td style="text-align: right; font-weight: bold; color: ${color};">฿${Math.round(pTotal).toLocaleString()}</td></tr></tfoot></table></div>`;
            }
            area.innerHTML = contentHtml + '</div>';
            const element = document.getElementById('pdf-container');
            element.classList.remove('hidden');
            const opt = { margin: 0.5, filename: `Report-${category}.pdf`, html2canvas: { scale: 3 }, jsPDF: { unit: 'in', format: 'a4' } };
            html2pdf().set(opt).from(area).toPdf().get('pdf').save().then(() => element.classList.add('hidden'));
        }
        window.onload = loadData;
    </script>
</body>
</html>
