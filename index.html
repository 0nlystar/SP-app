<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEBT CLOUD - PASTEL 3 COLORS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FFF0F3;    /* 60% Pinkish White */
            --bg-secondary: #E3F2FD;  /* 30% Pastel Blue */
            --color-accent: #FFD54F;  /* 10% Pastel Yellow */
            --text-main: #37474F;     /* Charcoal for clarity */
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-primary);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent; 
        }

        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Secondary Elements (30%) */
        .secondary-card {
            background-color: var(--bg-secondary);
            border: 2px solid #BBDEFB;
            border-radius: 24px;
        }

        /* Accent Elements (10%) */
        .cta-btn {
            background-color: var(--color-accent);
            color: #5D4037; /* Darker brown for text on yellow */
            box-shadow: 0 4px 0px #FBC02D;
            transition: all 0.1s;
        }
        .cta-btn:active { transform: translateY(2px); box-shadow: 0 2px 0px #FBC02D; }

        /* Progress Bar */
        .progress-container { width: 100%; height: 8px; background: #FFF; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--color-accent); border-radius: 10px; transition: width 0.5s ease; }

        .debt-card {
            background: white;
            border: 1px solid #F8BBD0;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(248, 187, 208, 0.2);
        }
        .report-pending { border: 2px solid #FFAB91 !important; background: #FFF9F8 !important; }

        /* Bottom Nav */
        .nav-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--bg-secondary);
        }
    </style>
</head>
<body class="min-h-screen pb-28">

    <header class="sticky top-0 bg-white/80 backdrop-blur-md z-40 p-5 flex justify-between items-center border-b-2 border-[#FCE4EC]">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-[#F8BBD0] rounded-full flex items-center justify-center text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="font-bold text-xl text-[#AD1457]" id="currentTitle">สรุปยอด</h1>
        </div>
        <div class="flex gap-1.5">
            <button onclick="generatePDF('shopee')" class="p-2 bg-orange-100 text-orange-600 rounded-lg text-[10px] font-bold border border-orange-200">SHOPEE</button>
            <button onclick="generatePDF('loan')" class="p-2 bg-blue-100 text-blue-600 rounded-lg text-[10px] font-bold border border-blue-200">LOAN</button>
            <button onclick="loginAdmin()" id="adminLock" class="bg-slate-100 p-2 rounded-full text-slate-400">🔒</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5">
        <section id="page-home" class="page-section active">
            <div class="secondary-card p-8 text-center mb-8 shadow-inner">
                <p class="text-blue-600 text-xs font-bold uppercase tracking-widest mb-1">ยอดรวมที่ต้องเก็บ</p>
                <div id="totalMonthlyAmount" class="text-5xl font-bold text-blue-800">฿0</div>
            </div>
            <div id="monthlySummaryArea" class="space-y-3"></div>
        </section>

        <section id="page-active" class="page-section">
            <div id="adminPanel" class="hidden mb-6 secondary-card p-6">
                <div id="nameTagsArea" class="flex flex-wrap gap-1.5 mb-4"></div>
                <div class="space-y-3">
                    <input type="text" id="debtorName" placeholder="ชื่อคนกู้" class="w-full p-4 rounded-xl border-none outline-none focus:ring-2 ring-pink-300 text-lg">
                    <input type="text" id="itemName" placeholder="รายการ" class="w-full p-4 rounded-xl border-none outline-none focus:ring-2 ring-pink-300 text-lg">
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 p-4 rounded-xl bg-white font-bold border-none text-blue-600">
                            <option value="shopee">Shopee</option>
                            <option value="loan">เงินกู้</option>
                        </select>
                        <input type="number" id="defaultAmount" placeholder="ยอด" class="flex-1 p-4 rounded-xl font-bold text-center border-none">
                    </div>
                    <button onclick="addItem()" class="cta-btn w-full py-4 rounded-xl font-bold text-sm uppercase tracking-widest">เพิ่มรายการใหม่</button>
                </div>
            </div>

            <div class="flex bg-white/50 p-1.5 rounded-full mb-6 border border-pink-200">
                <button onclick="switchTab('shopee')" id="tab-shopee" class="flex-1 py-3 text-xs font-bold rounded-full transition-all bg-white shadow-sm text-pink-600">SHOPEE</button>
                <button onclick="switchTab('loan')" id="tab-loan" class="flex-1 py-3 text-xs font-bold rounded-full transition-all text-blue-400">LOAN</button>
            </div>
            <div id="activeListContent" class="space-y-4"></div>
        </section>

        <section id="page-history" class="page-section">
            <div id="historyList" class="space-y-3 opacity-60"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 w-full h-20 nav-bar flex items-center px-4 z-50">
        <button onclick="switchPage('home', 'สรุปยอด')" class="flex-1 flex flex-col items-center text-pink-500" id="nav-home">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold mt-1">หน้าแรก</span>
        </button>
        <button onclick="switchPage('active', 'รายการค้าง')" class="flex-1 flex flex-col items-center text-slate-400" id="nav-active">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9zM7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
            <span class="text-[10px] font-bold mt-1">ค้างชำระ</span>
        </button>
        <button onclick="switchPage('history', 'ประวัติ')" class="flex-1 flex flex-col items-center text-slate-400" id="nav-history">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-bold mt-1">จ่ายครบ</span>
        </button>
    </nav>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-end justify-center z-[60]">
        <div class="bg-white rounded-t-[3rem] w-full max-w-md p-8 shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <div id="mDebtorSub" class="text-blue-500 font-bold text-xs uppercase"></div>
            <h3 id="mItemTitle" class="text-2xl font-bold text-slate-800 mb-6"></h3>
            <div id="monthGrid" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2"></div>
            <div class="mt-6 flex justify-between items-center p-5 secondary-card border-none">
                <span class="font-bold text-xs text-blue-700">PAID TOTAL</span>
                <span id="mTotalAmount" class="text-2xl font-bold text-blue-800">฿0</span>
            </div>
            <button onclick="closeModal()" class="cta-btn w-full mt-4 py-4 rounded-2xl font-bold uppercase text-sm">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="pdf-container" class="hidden"><div id="pdf-content"></div></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuoGoCZ0IisovMTtrJmbwqL4gS_mSIRYiPINPJPCmqCkDLjpm2IfUgDJ4s6ZgGwVHq/exec"; 
        const ADMIN_PASS = "onlystar"; 
        let items = []; let isAdmin = false; let currentTab = 'shopee';

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                items = data || [];
                render(); 
            } catch (e) { console.error("Load Error"); }
        }

        function switchPage(p, t) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('text-pink-500'); b.classList.add('text-slate-400'); });
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('nav-'+p).classList.replace('text-slate-400', 'text-pink-500');
            document.getElementById('currentTitle').innerText = t;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-shopee').className = `flex-1 py-3 text-xs font-bold rounded-full transition-all ${tab==='shopee'?'bg-white text-pink-600 shadow-sm':'text-blue-400'}`;
            document.getElementById('tab-loan').className = `flex-1 py-3 text-xs font-bold rounded-full transition-all ${tab==='loan'?'bg-white text-pink-600 shadow-sm':'text-blue-400'}`;
            render();
        }

        function render() {
            const activeList = document.getElementById('activeListContent');
            const historyList = document.getElementById('historyList');
            const summaryArea = document.getElementById('monthlySummaryArea');
            activeList.innerHTML = ''; historyList.innerHTML = ''; summaryArea.innerHTML = '';

            let grandTotal = 0; const summaryData = {};
            items.forEach(i => {
                const nextPay = i.payments.find(p => !p.isPaid);
                if (nextPay) {
                    summaryData[i.debtor] = (summaryData[i.debtor] || 0) + nextPay.amount;
                    grandTotal += nextPay.amount;
                }
            });
            document.getElementById('totalMonthlyAmount').innerText = `฿${Math.round(grandTotal).toLocaleString()}`;
            
            Object.keys(summaryData).forEach(name => {
                summaryArea.innerHTML += `
                    <div class="debt-card p-5 flex justify-between items-center border-l-4 border-l-blue-400">
                        <span class="font-bold text-slate-700">คุณ${name}</span>
                        <span class="font-bold text-blue-600 text-lg">฿${Math.round(summaryData[name]).toLocaleString()}</span>
                    </div>`;
            });

            const activeItems = items.filter(i => i.payments.some(p => !p.isPaid) && i.cat === currentTab);
            const groups = activeItems.reduce((acc, curr) => {
                if(!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in groups) {
                let html = `<div class="mb-2"><h3 class="text-[10px] font-bold text-pink-400 uppercase tracking-widest mb-2 ml-2">👤 ${name}</h3><div class="space-y-3">`;
                groups[name].forEach(p => html += renderCard(p));
                html += `</div></div>`;
                activeList.innerHTML += html;
            }
            items.filter(i => i.payments.every(p => p.isPaid)).forEach(p => historyList.innerHTML += renderCard(p));
            renderNameTags();
        }

        function renderCard(p) {
            const paid = p.payments.filter(m => m.isPaid).length;
            const percent = Math.round((paid / p.totalMonths) * 100);
            const reported = p.payments.some(m => m.reported && !m.isPaid);

            return `
                <div class="flex items-center gap-2">
                    <div onclick="openModal(${p.id})" class="debt-card flex-1 flex items-center gap-4 p-4 cursor-pointer ${reported ? 'report-pending' : ''}">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-end mb-2">
                                <div class="font-bold text-xs text-slate-700 truncate">${reported ? '🔔 ' : ''}${p.item}</div>
                                <div class="text-[9px] font-bold text-pink-500">${percent}%</div>
                            </div>
                            <div class="progress-container"><div class="progress-bar" style="width: ${percent}%"></div></div>
                        </div>
                    </div>
                    ${isAdmin ? `<button onclick="deleteItem(${p.id})" class="w-10 h-14 bg-red-50 text-red-400 rounded-2xl flex items-center justify-center">✕</button>` : ''}
                </div>`;
        }

        function openModal(id) {
            const p = items.find(x => x.id === id);
            document.getElementById('mDebtorSub').innerText = `ลูกหนี้: ${p.debtor}`;
            document.getElementById('mItemTitle').innerText = p.item;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            let totalPaid = 0;

            p.payments.forEach((m, i) => {
                if(m.isPaid) totalPaid += m.amount;
                const status = m.isPaid ? 'bg-green-50 text-green-600 border-green-100' : (m.reported ? 'bg-amber-50 text-amber-600 border-amber-100' : 'bg-slate-50 text-slate-400 border-slate-100');
                grid.innerHTML += `
                    <div class="flex items-center gap-3 p-4 rounded-2xl border ${status}">
                        <span class="text-[9px] font-bold w-10">งวด ${i+1}</span>
                        <input type="number" value="${m.amount}" ${!isAdmin ? 'disabled' : ''} onchange="updateAmt(${p.id}, ${i}, this.value)" class="flex-1 bg-transparent text-right font-bold outline-none text-slate-800">
                        <button onclick="togglePay(${p.id}, ${i})" ${!isAdmin && m.reported ? 'disabled' : ''} class="w-10 h-10 rounded-full flex items-center justify-center ${m.isPaid ? 'bg-green-500 text-white' : 'bg-slate-200 text-white'}">${m.isPaid ? '✓' : (isAdmin ? '⚬' : '🔔')}</button>
                    </div>`;
            });
            document.getElementById('mTotalAmount').innerText = `฿${Math.round(totalPaid).toLocaleString()}`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function togglePay(id, idx) {
            const p = items.find(x => x.id === id);
            if (isAdmin) { p.payments[idx].isPaid = !p.payments[idx].isPaid; p.payments[idx].reported = false; }
            else { p.payments[idx].reported = true; alert("ส่งแจ้งยอดเรียบร้อย 🔔"); }
            openModal(id); render(); await saveCloud();
        }

        function updateAmt(id, idx, val) { items.find(x => x.id === id).payments[idx].amount = parseFloat(val) || 0; saveCloud(); }

        async function addItem() {
            const n = document.getElementById('debtorName').value;
            const it = document.getElementById('itemName').value;
            const a = document.getElementById('defaultAmount').value;
            if(!n || !it || !a) return alert("ใส่ข้อมูลให้ครบ!");
            items.push({ id: Date.now(), cat: document.getElementById('category').value, debtor: n, item: it, totalMonths: 12, payments: Array.from({length: 12}, () => ({isPaid: false, amount: parseFloat(a), reported: false})) });
            render(); await saveCloud();
        }

        async function saveCloud() { try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(items) }); } catch (e) {} }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); render(); }
        function loginAdmin() { if (prompt("Admin Key:") === ADMIN_PASS) { isAdmin = true; document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('adminLock').innerText = "🔓"; render(); } }
        function renderNameTags() { const area = document.getElementById('nameTagsArea'); const names = [...new Set(items.map(i => i.debtor))]; area.innerHTML = names.map(n => `<div onclick="document.getElementById('debtorName').value='${n}'" class="px-3 py-1 bg-white rounded-full text-[10px] font-bold text-pink-500 border border-pink-100 cursor-pointer">${n}</div>`).join(''); }

        // --- PDF ENGINE (กลับมาสมบูรณ์) ---
        function generatePDF(type) {
            const content = document.getElementById('pdf-content');
            const today = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            const filteredItems = items.filter(i => i.cat === type && i.payments.some(p => !p.isPaid));
            if (filteredItems.length === 0) { alert("ไม่มีข้อมูลค้างชำระ"); return; }

            let html = `<div style="font-family: 'Kanit', sans-serif; padding: 40px; background: #fff;">
                <h1 style="color: ${type === 'shopee' ? '#ea580c' : '#2563eb'}; border-bottom: 3px solid; padding-bottom: 10px;">รายการค้างชำระ: ${type.toUpperCase()}</h1>
                <p>วันที่ออกเอกสาร: ${today}</p>`;

            const grouped = filteredItems.reduce((acc, curr) => { if (!acc[curr.debtor]) acc[curr.debtor] = []; acc[curr.debtor].push(curr); return acc; }, {});
            for (const name in grouped) {
                let total = 0;
                html += `<div style="margin-top: 30px; border: 1px solid #ddd; border-radius: 10px; overflow: hidden;">
                    <div style="background: #f9f9f9; padding: 10px 20px; font-weight: bold;">คุณ${name}</div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr style="text-align: left; font-size: 12px; border-bottom: 1px solid #eee;"><th style="padding: 10px 20px;">รายการ</th><th style="padding: 10px 20px; text-align: right;">ยอดงวดนี้</th></tr>`;
                grouped[name].forEach(item => {
                    const next = item.payments.find(p => !p.isPaid);
                    total += next ? next.amount : 0;
                    html += `<tr style="border-bottom: 1px solid #eee;"><td style="padding: 10px 20px;">${item.item}</td><td style="padding: 10px 20px; text-align: right; font-weight: bold;">฿${Math.round(next.amount).toLocaleString()}</td></tr>`;
                });
                html += `</table><div style="padding: 15px 20px; text-align: right; background: #fffcf0;"><b>รวม: ฿${Math.round(total).toLocaleString()}</b></div></div>`;
            }
            html += `<p style="text-align: center; margin-top: 40px; color: #999; font-size: 10px;">เอกสารจากระบบ Debt Cloud</p></div>`;
            content.innerHTML = html;
            const opt = { margin: 0.5, filename: `Debt-${type}.pdf`, html2canvas: { scale: 3 }, jsPDF: { unit: 'in', format: 'a4' } };
            html2pdf().set(opt).from(content).save();
        }

        window.onload = loadData;
    </script>
</body>
</html>
