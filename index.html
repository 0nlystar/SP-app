<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEBT CLOUD - PASTEL 60-30-10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FCFDF9;    /* 60% */
            --secondary-bg: #E3F2FD;  /* 30% */
            --accent-color: #FF8A80;  /* 10% */
            --text-dark: #37474F;
            --text-light: #607D8B;
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--primary-bg);
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent; 
        }

        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* 30% Elements: Secondary Color */
        .secondary-element {
            background-color: var(--secondary-bg);
            border: 1px solid #BBDEFB;
        }

        /* 10% Elements: Accent CTA */
        .cta-button {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 138, 128, 0.3);
            transition: all 0.2s ease;
        }
        .cta-button:active { transform: scale(0.95); filter: brightness(0.9); }

        /* Progress Bar */
        .progress-box { 
            width: 100%; height: 8px; background: #ECEFF1; border-radius: 99px; overflow: hidden;
        }
        .progress-fill { 
            height: 100%; background: var(--accent-color); border-radius: 99px;
            transition: width 0.8s ease-in-out; 
        }

        /* Nav & Cards */
        .glass-nav {
            background: rgba(252, 253, 249, 0.9);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--secondary-bg);
        }
        .debt-card {
            background: white;
            border: 2px solid var(--secondary-bg);
            border-radius: 20px;
            transition: transform 0.2s;
        }
        .debt-card:active { background: var(--secondary-bg); }

        /* Status Colors */
        .report-pending { border: 2px solid #FFD54F !important; background: #FFFDE7 !important; }
    </style>
</head>
<body class="min-h-screen pb-28">

    <header class="sticky top-0 bg-white z-40 p-5 flex justify-between items-center border-b-2 border-[#E3F2FD]">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center cta-button">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="font-bold text-xl tracking-tight" id="currentTitle">สรุปยอด</h1>
        </div>
        <div class="flex gap-1">
            <button onclick="generatePDF('shopee')" class="px-3 py-1.5 bg-[#FFF3E0] text-[#E65100] rounded-full text-[10px] font-bold border border-[#FFE0B2]">SHOPEE</button>
            <button onclick="generatePDF('loan')" class="px-3 py-1.5 bg-[#E1F5FE] text-[#01579B] rounded-full text-[10px] font-bold border border-[#B3E5FC]">LOAN</button>
            <button onclick="loginAdmin()" id="adminLock" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-400">🔒</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5">
        <section id="page-home" class="page-section active">
            <div class="secondary-element rounded-[2.5rem] p-10 text-center mb-8">
                <p class="text-text-light text-xs font-semibold uppercase tracking-widest mb-2">Total Collection</p>
                <div id="totalMonthlyAmount" class="text-5xl font-bold text-text-dark">฿0</div>
            </div>
            <div id="monthlySummaryArea" class="space-y-3"></div>
        </section>

        <section id="page-active" class="page-section">
            <div id="adminPanel" class="hidden mb-8 secondary-element p-6 rounded-3xl">
                <div id="nameTagsArea" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="space-y-3">
                    <input type="text" id="debtorName" placeholder="ชื่อลูกหนี้" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 ring-blue-200">
                    <input type="text" id="itemName" placeholder="รายการ" class="w-full p-4 rounded-2xl border-none outline-none focus:ring-2 ring-blue-200">
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 p-4 rounded-2xl bg-white font-bold border-none">
                            <option value="shopee">Shopee</option>
                            <option value="loan">เงินกู้</option>
                        </select>
                        <input type="number" id="defaultAmount" placeholder="ยอด" class="flex-1 p-4 rounded-2xl font-bold text-center border-none">
                    </div>
                    <button onclick="addItem()" class="w-full cta-button py-4 rounded-2xl font-bold text-sm uppercase tracking-widest">บันทึกลงคลาวด์</button>
                </div>
            </div>

            <div class="flex bg-[#ECEFF1] p-1 rounded-full mb-6">
                <button onclick="switchTab('shopee')" id="tab-shopee" class="flex-1 py-3 text-xs font-bold rounded-full transition-all bg-white text-text-dark shadow-sm">SHOPEE</button>
                <button onclick="switchTab('loan')" id="tab-loan" class="flex-1 py-3 text-xs font-bold rounded-full transition-all text-text-light">เงินกู้</button>
            </div>

            <div id="activeListContent" class="space-y-4"></div>
        </section>

        <section id="page-history" class="page-section">
            <div id="historyList" class="space-y-3 opacity-60"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 w-full h-20 glass-nav flex items-center px-6 z-50">
        <button onclick="switchPage('home', 'สรุปยอด')" class="flex-1 flex flex-col items-center text-accent-color" id="nav-home">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold mt-1">HOME</span>
        </button>
        <button onclick="switchPage('active', 'รายการค้าง')" class="flex-1 flex flex-col items-center text-text-light" id="nav-active">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg>
            <span class="text-[10px] font-bold mt-1">LIST</span>
        </button>
        <button onclick="switchPage('history', 'ประวัติ')" class="flex-1 flex flex-col items-center text-text-light" id="nav-history">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            <span class="text-[10px] font-bold mt-1">HISTORY</span>
        </button>
    </nav>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end justify-center z-[60]">
        <div class="bg-white rounded-t-[3rem] w-full max-w-md p-8 shadow-2xl transition-transform">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <div id="mDebtorSub" class="text-accent-color font-bold text-xs tracking-widest uppercase"></div>
            <h3 id="mItemTitle" class="text-2xl font-bold text-text-dark mb-6"></h3>
            
            <div id="monthGrid" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2"></div>
            
            <div class="mt-6 flex justify-between items-center p-5 secondary-element rounded-2xl">
                <span class="font-bold text-xs uppercase tracking-widest text-text-light">Paid Total</span>
                <span id="mTotalAmount" class="text-2xl font-bold text-text-dark">฿0</span>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 cta-button py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="pdf-container" class="hidden"><div id="pdf-content"></div></div>

    <script>
        // --- Logic Engine (คงเดิมเพื่อการใช้งาน) ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuoGoCZ0IisovMTtrJmbwqL4gS_mSIRYiPINPJPCmqCkDLjpm2IfUgDJ4s6ZgGwVHq/exec"; 
        const ADMIN_PASS = "onlystar"; 
        let items = []; 
        let isAdmin = false; 
        let currentTab = 'shopee';

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                items = data || [];
                render(); 
            } catch (e) { console.error(e); }
        }

        function switchPage(pageId, title) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(n => {
                n.classList.remove('text-accent-color');
                n.classList.add('text-text-light');
            });
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.replace('text-text-light', 'text-accent-color');
            document.getElementById('currentTitle').innerText = title;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-shopee').className = `flex-1 py-3 text-xs font-bold rounded-full transition-all ${tab==='shopee'?'bg-white text-text-dark shadow-sm':'text-text-light'}`;
            document.getElementById('tab-loan').className = `flex-1 py-3 text-xs font-bold rounded-full transition-all ${tab==='loan'?'bg-white text-text-dark shadow-sm':'text-text-light'}`;
            render();
        }

        function render() {
            const activeList = document.getElementById('activeListContent');
            const historyList = document.getElementById('historyList');
            const summaryArea = document.getElementById('monthlySummaryArea');
            activeList.innerHTML = ''; historyList.innerHTML = ''; summaryArea.innerHTML = '';

            let grandTotal = 0;
            const summaryData = {};
            items.forEach(item => {
                const nextPay = item.payments.find(p => !p.isPaid);
                if (nextPay) {
                    summaryData[item.debtor] = (summaryData[item.debtor] || 0) + nextPay.amount;
                    grandTotal += nextPay.amount;
                }
            });
            document.getElementById('totalMonthlyAmount').innerText = `฿${Math.round(grandTotal).toLocaleString()}`;
            
            Object.keys(summaryData).forEach(name => {
                summaryArea.innerHTML += `
                    <div class="debt-card p-5 flex justify-between items-center border-none secondary-element">
                        <span class="font-bold text-text-dark">คุณ${name}</span>
                        <span class="font-bold text-text-dark text-lg">฿${Math.round(summaryData[name]).toLocaleString()}</span>
                    </div>`;
            });

            const activeItems = items.filter(i => i.payments.some(p => !p.isPaid) && i.cat === currentTab);
            const groups = activeItems.reduce((acc, curr) => {
                if(!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in groups) {
                let html = `<div class="mb-2">
                    <h3 class="font-bold text-[10px] text-text-light uppercase tracking-[0.2em] mb-3 ml-2">👤 CLIENT: ${name}</h3>
                    <div class="space-y-3">`;
                groups[name].forEach(p => html += renderCard(p));
                html += `</div></div>`;
                activeList.innerHTML += html;
            }
            items.filter(i => i.payments.every(p => p.isPaid)).forEach(p => historyList.innerHTML += renderCard(p));
            renderNameTags();
        }

        function renderCard(p) {
            const paidCount = p.payments.filter(m => m.isPaid).length;
            const percent = Math.round((paidCount / p.totalMonths) * 100);
            const hasReport = p.payments.some(m => m.reported && !m.isPaid);

            return `
                <div class="flex items-center gap-2">
                    <div onclick="openModal(${p.id})" 
                         class="debt-card flex-1 flex items-center gap-4 p-4 cursor-pointer ${hasReport ? 'report-pending' : ''}">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-end mb-2">
                                <div class="font-bold text-xs text-text-dark truncate uppercase">${hasReport ? '🔔 ' : ''}${p.item}</div>
                                <div class="text-[9px] font-bold text-text-light">${percent}%</div>
                            </div>
                            <div class="progress-box">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <button onclick="deleteItem(${p.id})" class="w-12 h-14 flex items-center justify-center bg-red-50 rounded-2xl text-red-400 border border-red-100 active:bg-red-400 active:text-white">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>` : ''}
                </div>`;
        }

        function openModal(id) {
            const p = items.find(x => x.id === id);
            document.getElementById('mDebtorSub').innerText = `Client: ${p.debtor}`;
            document.getElementById('mItemTitle').innerText = p.item;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            let totalPaid = 0;

            p.payments.forEach((m, i) => {
                if(m.isPaid) totalPaid += m.amount;
                const statusClass = m.isPaid ? 'bg-green-50 border-green-100 text-green-700' : (m.reported ? 'bg-amber-50 border-amber-100 text-amber-700' : 'bg-slate-50 border-slate-100 text-slate-400');
                grid.innerHTML += `
                    <div class="flex items-center gap-3 p-4 rounded-2xl border ${statusClass}">
                        <span class="text-[9px] font-bold w-10 uppercase">งวด ${i+1}</span>
                        <input type="number" value="${m.amount}" ${!isAdmin ? 'disabled' : ''} onchange="updateAmt(${p.id}, ${i}, this.value)" class="flex-1 bg-transparent text-right font-bold outline-none text-text-dark">
                        <button onclick="togglePay(${p.id}, ${i})" ${!isAdmin && m.reported ? 'disabled' : ''} class="w-10 h-10 rounded-full flex items-center justify-center transition-all ${m.isPaid ? 'bg-green-500 text-white' : 'bg-slate-200 text-white active:scale-90'}">
                            ${m.isPaid ? '✓' : (isAdmin ? '⚬' : '🔔')}
                        </button>
                    </div>`;
            });
            document.getElementById('mTotalAmount').innerText = `฿${Math.round(totalPaid).toLocaleString()}`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function togglePay(id, idx) {
            const p = items.find(x => x.id === id);
            if (isAdmin) {
                p.payments[idx].isPaid = !p.payments[idx].isPaid;
                p.payments[idx].reported = false;
            } else {
                p.payments[idx].reported = true;
                alert("ส่งแจ้งเตือนเรียบร้อย! 🔔");
            }
            openModal(id); render(); await saveCloud();
        }

        function updateAmt(id, idx, val) {
            items.find(x => x.id === id).payments[idx].amount = parseFloat(val) || 0;
            saveCloud();
        }

        async function addItem() {
            const name = document.getElementById('debtorName').value;
            const item = document.getElementById('itemName').value;
            const amt = document.getElementById('defaultAmount').value;
            if(!name || !item || !amt) return alert("กรุณากรอกข้อมูล!");

            items.push({
                id: Date.now(), cat: document.getElementById('category').value,
                debtor: name, item: item, totalMonths: 12,
                payments: Array.from({length: 12}, () => ({isPaid: false, amount: parseFloat(amt), reported: false}))
            });
            render(); await saveCloud();
        }

        async function saveCloud() {
            try { await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(items) }); } catch (e) {}
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); render(); }

        function loginAdmin() {
            const p = prompt("Admin Key:");
            if (p === ADMIN_PASS) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminLock').innerHTML = "🔓";
                document.getElementById('adminLock').classList.replace('bg-slate-100', 'cta-button');
                render();
            }
        }

        function renderNameTags() {
            const area = document.getElementById('nameTagsArea');
            const names = [...new Set(items.map(i => i.debtor))];
            area.innerHTML = names.map(n => `<div onclick="document.getElementById('debtorName').value='${n}'" class="px-3 py-1 bg-white border-2 border-secondary-bg rounded-full text-[10px] font-bold text-text-light cursor-pointer hover:bg-secondary-bg transition-all">${n}</div>`).join('');
        }

        function generatePDF(type) {
            alert("กำลังเตรียม PDF สำหรับ " + type.toUpperCase());
            // ส่วน PDF คงเดิมตามไฟล์ต้นฉบับที่คุณมี
        }

        window.onload = loadData;
    </script>
</body>
</html>
