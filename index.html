<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEBT CLOUD - CUTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #fbfdff;
            --pastel-blue: #a3d8f4;
            --pastel-blue-dark: #7bc0e3;
            --text-main: #546e7a;
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent; 
        }

        .page-section { display: none; transition: opacity 0.3s ease; opacity: 0; }
        .page-section.active { display: block; opacity: 1; animation: slideInUp 0.4s ease-out; }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar สไตล์มินิมอล */
        .progress-box { 
            position: relative; 
            width: 100%; 
            height: 10px; 
            background: #e1f5fe; 
            border-radius: 99px; 
            overflow: hidden;
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--pastel-blue), #81d4fa); 
            border-radius: 99px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); 
        }

        /* Cute Cards & Elements */
        .cute-card {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid #e1f5fe;
            box-shadow: 0 10px 20px -5px rgba(163, 216, 244, 0.15);
        }
        
        .debt-card { 
            transition: all 0.2s ease;
        }
        .debt-card:active { transform: scale(0.98); background-color: #f1faff; }
        
        .report-pending { border-left: 5px solid #ffd54f !important; background-color: #fffde7 !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #b3e5fc; border-radius: 10px; }

        /* Minimal Bottom Nav */
        .minimal-nav {
            left: 0;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e1f5fe;
            box-shadow: 0 -5px 15px rgba(163, 216, 244, 0.08);
        }
    </style>
</head>
<body class="min-h-screen pb-28">

    <header class="sticky top-0 bg-white/95 backdrop-blur-md z-40 p-5 flex justify-between items-center border-b border-sky-100">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-sky-100 rounded-full flex items-center justify-center text-sky-500 shadow-inner">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
                <h1 class="font-bold text-xl tracking-tight text-slate-800" id="currentTitle">สรุปยอด</h1>
                <div class="text-[10px] text-sky-400 font-medium tracking-wider leading-none">DEBT CLOUD - CUTE</div>
            </div>
        </div>
        <div class="flex gap-1.5">
            <button onclick="generatePDF('shopee')" class="p-2 bg-orange-50 text-orange-400 rounded-lg border border-orange-100 text-[10px] font-bold active:scale-95 transition">SHOPEE</button>
            <button onclick="generatePDF('loan')" class="p-2 bg-blue-50 text-blue-400 rounded-lg border border-blue-100 text-[10px] font-bold active:scale-95 transition">เงินกู้</button>
            <button onclick="loginAdmin()" id="adminLock" class="bg-slate-100 p-2 rounded-full text-slate-400 active:scale-90 transition">🔒</button>
        </div>
    </header>

    <main class="max-w-lg mx-auto p-5">
        <section id="page-home" class="page-section active">
            <div class="bg-sky-500 rounded-[2rem] p-9 text-center shadow-lg shadow-sky-500/15 mb-8 border border-sky-400">
                <p class="text-white/80 text-[11px] font-medium uppercase tracking-[0.2em] mb-1">ยอดต้องเก็บเดือนนี้</p>
                <div id="totalMonthlyAmount" class="text-5xl font-bold tracking-tight text-white">฿0</div>
            </div>
            <div id="monthlySummaryArea" class="space-y-4"></div>
        </section>

        <section id="page-active" class="page-section">
            <div id="adminPanel" class="hidden mb-8 cute-card p-6 border-2 border-dashed border-sky-200">
                <div id="nameTagsArea" class="flex flex-wrap gap-1.5 mb-4"></div>
                <div class="space-y-3">
                    <input type="text" id="debtorName" placeholder="ชื่อลูกหนี้" class="w-full p-4 bg-sky-50 rounded-2xl outline-none border border-sky-100 focus:border-sky-300 transition-all text-slate-700 placeholder:text-slate-400">
                    <input type="text" id="itemName" placeholder="รายการสินค้า/กู้" class="w-full p-4 bg-sky-50 rounded-2xl outline-none border border-sky-100 focus:border-sky-300 transition-all text-slate-700 placeholder:text-slate-400">
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 p-4 bg-white rounded-2xl font-bold text-slate-700 border border-sky-100">
                            <option value="shopee">Shopee</option>
                            <option value="loan">เงินกู้</option>
                        </select>
                        <input type="number" id="defaultAmount" placeholder="ยอด/งวด" class="flex-1 p-4 bg-sky-50 rounded-2xl font-bold text-center text-sky-600 border border-sky-100">
                        <select id="totalMonths" class="w-24 p-4 bg-white rounded-2xl font-bold text-slate-700 border border-sky-100">
                            <option value="1">1</option><option value="3">3</option><option value="6">6</option><option value="12" selected>12</option>
                        </select>
                    </div>
                    <button onclick="addItem()" class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 rounded-2xl shadow-lg shadow-sky-500/20 transition-all uppercase tracking-widest text-sm">บันทึกลง Cloud</button>
                </div>
            </div>

            <div class="flex bg-sky-50 p-1.5 rounded-full border border-sky-100 mb-6 shadow-inner">
                <button onclick="switchTab('shopee')" id="tab-shopee" class="flex-1 py-3 text-xs font-bold rounded-full transition-all bg-sky-500 text-white shadow-md">SHOPEE</button>
                <button onclick="switchTab('loan')" id="tab-loan" class="flex-1 py-3 text-xs font-bold rounded-full transition-all text-sky-400">เงินกู้</button>
            </div>

            <div id="activeListContent" class="space-y-6"></div>
        </section>

        <section id="page-history" class="page-section">
            <div id="historyList" class="space-y-3 opacity-70"></div>
        </section>
    </main>

    <nav class="fixed minimal-nav flex items-center px-4 z-50">
        <button onclick="switchPage('home', 'สรุปยอด')" class="flex-1 flex flex-col items-center justify-center text-sky-500" id="nav-home">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tight">Home</span>
        </button>
        <button onclick="switchPage('active', 'รายการค้าง')" class="flex-1 flex flex-col items-center justify-center text-slate-400" id="nav-active">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tight">List</span>
        </button>
        <button onclick="switchPage('history', 'จบการผ่อน')" class="flex-1 flex flex-col items-center justify-center text-slate-400" id="nav-history">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            <span class="text-[10px] font-bold mt-1 uppercase tracking-tight">History</span>
        </button>
    </nav>

    <div id="detailModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-[60]">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] max-w-md w-full p-8 shadow-2xl border border-sky-100 relative animation-slideUp">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <div class="flex justify-between items-start mb-6">
                <div>
                    <div id="mDebtorSub" class="text-sky-500 font-medium text-xs tracking-widest uppercase mb-0.5"></div>
                    <h3 id="mItemTitle" class="text-2xl font-bold text-slate-800 leading-tight"></h3>
                </div>
                <button onclick="closeModal()" class="text-slate-400 bg-slate-100 w-9 h-9 rounded-full flex items-center justify-center text-xl hover:bg-slate-200 active:scale-90 transition">&times;</button>
            </div>
            
            <div id="monthGrid" class="space-y-2 max-h-[40vh] overflow-y-auto pr-1.5"></div>
            
            <div class="mt-6 flex justify-between items-center p-5 bg-sky-50 rounded-2xl border border-sky-100">
                <span class="text-slate-500 text-xs font-medium uppercase tracking-widest">จ่ายรวมแล้ว</span>
                <span id="mTotalAmount" class="text-2xl font-bold text-sky-600">฿0</span>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 bg-sky-500 hover:bg-sky-400 text-white py-4 rounded-xl font-bold shadow-lg shadow-sky-500/15 active:scale-95 transition-all uppercase tracking-widest text-sm">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="pdf-container" class="hidden"><div id="pdf-content"></div></div>

    <script>
        // --- ส่วน Logic คงเดิมทั้งหมด ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuoGoCZ0IisovMTtrJmbwqL4gS_mSIRYiPINPJPCmqCkDLjpm2IfUgDJ4s6ZgGwVHq/exec"; 
        const ADMIN_PASS = "onlystar"; 
        let items = []; 
        let isAdmin = false; 
        let currentTab = 'shopee';

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                items = data || [];
                render(); 
            } catch (e) { console.error(e); }
        }

        function switchPage(pageId, title) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(n => {
                n.classList.remove('text-sky-500');
                n.classList.add('text-slate-400');
            });
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.replace('text-slate-400', 'text-sky-500');
            document.getElementById('currentTitle').innerText = title;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-shopee').className = `flex-1 py-3 text-xs font-bold rounded-full transition-all ${tab==='shopee'?'bg-sky-500 text-white shadow-md shadow-sky-500/15':'text-sky-400'}`;
            document.getElementById('tab-loan').className = `flex-1 py-3 text-xs font-bold rounded-full transition-all ${tab==='loan'?'bg-sky-500 text-white shadow-md shadow-sky-500/15':'text-sky-400'}`;
            render();
        }

        function render() {
            const activeList = document.getElementById('activeListContent');
            const historyList = document.getElementById('historyList');
            const summaryArea = document.getElementById('monthlySummaryArea');
            activeList.innerHTML = ''; historyList.innerHTML = ''; summaryArea.innerHTML = '';

            let grandTotal = 0;
            const summaryData = {};
            items.forEach(item => {
                const nextPay = item.payments.find(p => !p.isPaid);
                if (nextPay) {
                    summaryData[item.debtor] = (summaryData[item.debtor] || 0) + nextPay.amount;
                    grandTotal += nextPay.amount;
                }
            });
            document.getElementById('totalMonthlyAmount').innerText = `฿${Math.round(grandTotal).toLocaleString()}`;
            
            Object.keys(summaryData).forEach(name => {
                summaryArea.innerHTML += `
                    <div class="cute-card p-5 flex justify-between items-center border border-sky-100 shadow-xl shadow-sky-500/5">
                        <div class="flex items-center gap-2.5">
                            <div class="w-1.5 h-1.5 rounded-full bg-sky-300"></div>
                            <span class="font-medium text-slate-600">คุณ${name}</span>
                        </div>
                        <span class="font-bold text-sky-600 text-lg">฿${Math.round(summaryData[name]).toLocaleString()}</span>
                    </div>`;
            });

            const activeItems = items.filter(i => i.payments.some(p => !p.isPaid) && i.cat === currentTab);
            const groups = activeItems.reduce((acc, curr) => {
                if(!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in groups) {
                let html = `<div class="mb-1">
                    <h3 class="font-bold text-[11px] text-sky-400 uppercase tracking-[0.15em] mb-2.5 ml-2 flex items-center gap-2">
                        <span class="w-1 h-1 rounded-full bg-sky-200"></span> ${name}
                    </h3>
                    <div class="space-y-3">`;
                groups[name].forEach(p => html += renderCard(p));
                html += `</div></div>`;
                activeList.innerHTML += html;
            }
            items.filter(i => i.payments.every(p => p.isPaid)).forEach(p => historyList.innerHTML += renderCard(p));
            renderNameTags();
        }

        function renderCard(p) {
            const paidCount = p.payments.filter(m => m.isPaid).length;
            const percent = Math.round((paidCount / p.totalMonths) * 100);
            const hasReport = p.payments.some(m => m.reported && !m.isPaid);

            return `
                <div class="flex items-center gap-2 group">
                    <div onclick="openModal(${p.id})" 
                         class="debt-card cute-card flex-1 flex items-center gap-3 p-4 cursor-pointer border-sky-100 ${hasReport ? 'report-pending' : ''}">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-end mb-1.5">
                                <div class="font-medium text-xs text-slate-700 truncate pr-2 uppercase tracking-tight">${hasReport ? '<span class="text-amber-500">!</span> ' : ''}${p.item}</div>
                                <div class="text-[9px] font-bold text-sky-400">${percent}%</div>
                            </div>
                            <div class="progress-box">
                                <div class="progress-fill" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <button onclick="deleteItem(${p.id})" class="w-11 h-12 flex items-center justify-center bg-red-50 rounded-2xl text-red-400 border border-red-100 active:bg-red-500 active:text-white transition-all hover:border-red-200">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>` : ''}
                </div>`;
        }

        function openModal(id) {
            const p = items.find(x => x.id === id);
            document.getElementById('mDebtorSub').innerText = `คุณ: ${p.debtor}`;
            document.getElementById('mItemTitle').innerText = p.item;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            let totalPaid = 0;

            p.payments.forEach((m, i) => {
                if(m.isPaid) totalPaid += m.amount;
                const statusClass = m.isPaid ? 'bg-emerald-50 border-emerald-100 text-emerald-600' : (m.reported ? 'bg-amber-50 border-amber-100 text-amber-600' : 'bg-slate-50 border-slate-100 text-slate-500');
                grid.innerHTML += `
                    <div class="flex items-center gap-3 p-3.5 rounded-xl border ${statusClass} transition-all">
                        <span class="text-[9px] font-bold uppercase w-10 text-slate-400">งวด ${i+1}</span>
                        <input type="number" value="${m.amount}" ${!isAdmin ? 'disabled' : ''} onchange="updateAmt(${p.id}, ${i}, this.value)" class="flex-1 bg-transparent text-right font-bold outline-none text-slate-800">
                        <button onclick="togglePay(${p.id}, ${i})" ${!isAdmin && m.reported ? 'disabled' : ''} class="w-9 h-9 rounded-full flex items-center justify-center shadow-inner transition-all ${m.isPaid ? 'bg-sky-400 text-white' : 'bg-slate-200 text-white active:scale-90'}">
                            ${m.isPaid ? '✓' : (isAdmin ? '⚬' : '🔔')}
                        </button>
                    </div>`;
            });
            document.getElementById('mTotalAmount').innerText = `฿${Math.round(totalPaid).toLocaleString()}`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        async function togglePay(id, idx) {
            const p = items.find(x => x.id === id);
            if (isAdmin) {
                p.payments[idx].isPaid = !p.payments[idx].isPaid;
                p.payments[idx].reported = false;
            } else {
                p.payments[idx].reported = true;
                alert("แจ้งข้อมูลชำระเรียบร้อย 🔔");
            }
            openModal(id); render(); await saveCloud();
        }

        function updateAmt(id, idx, val) {
            items.find(x => x.id === id).payments[idx].amount = parseFloat(val) || 0;
            saveCloud();
        }

        async function addItem() {
            const name = document.getElementById('debtorName').value;
            const item = document.getElementById('itemName').value;
            const amt = document.getElementById('defaultAmount').value;
            const months = parseInt(document.getElementById('totalMonths').value);
            if(!name || !item || !amt) return alert("กรอกข้อมูลให้ครบ!");

            items.push({
                id: Date.now(), cat: document.getElementById('category').value,
                debtor: name, item: item, totalMonths: months,
                payments: Array.from({length: months}, () => ({isPaid: false, amount: parseFloat(amt), reported: false}))
            });
            render(); await saveCloud();
            document.getElementById('itemName').value = '';
        }

        async function deleteItem(id) {
            if(confirm("ลบรายการนี้ถาวร?")) {
                items = items.filter(x => x.id !== id);
                render(); await saveCloud();
            }
        }

        async function saveCloud() {
            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(items) });
            } catch (e) { console.error("Cloud Save Error"); }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); render(); }

        function loginAdmin() {
            const p = prompt("รหัสแอดมิน:");
            if (p === ADMIN_PASS) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminLock').innerHTML = "🔓";
                document.getElementById('adminLock').classList.replace('bg-slate-100', 'bg-sky-400');
                document.getElementById('adminLock').classList.replace('text-slate-400', 'text-white');
                render();
            }
        }

        function renderNameTags() {
            const area = document.getElementById('nameTagsArea');
            const names = [...new Set(items.map(i => i.debtor))];
            area.innerHTML = names.map(n => `<div onclick="document.getElementById('debtorName').value='${n}'" class="px-3.5 py-1.5 bg-sky-50 rounded-full text-[10px] font-bold text-sky-500 cursor-pointer hover:bg-sky-100 transition-all uppercase tracking-tighter">${n}</div>`).join('');
        }

        // --- PDF Logic คงเดิมตามคำขอ ---
        function generatePDF(type) {
            const content = document.getElementById('pdf-content');
            const today = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            const filteredItems = items.filter(i => i.cat === type && i.payments.some(p => !p.isPaid));
            if (filteredItems.length === 0) { alert("ไม่มีข้อมูลค้างชำระในหมวดนี้"); return; }

            let html = `<div style="font-family: 'Kanit', sans-serif; padding: 40px; background: #fff; color: #334155;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid ${type === 'shopee' ? '#f97316' : '#3b82f6'}; padding-bottom: 20px; margin-bottom: 30px;">
                    <div>
                        <h1 style="margin: 0; font-size: 28px; color: ${type === 'shopee' ? '#ea580c' : '#2563eb'};">รายงานค้างชำระ: ${type.toUpperCase()}</h1>
                        <p style="margin: 5px 0 0 0; opacity: 0.7;">ประจำวันที่ ${today}</p>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-weight: bold; font-size: 18px;">DEBT CLOUD</div>
                        <div style="font-size: 12px; opacity: 0.6;">ระบบจัดการบัญชีไฮบริด</div>
                    </div>
                </div>`;

            const grouped = filteredItems.reduce((acc, curr) => {
                if (!acc[curr.debtor]) acc[curr.debtor] = [];
                acc[curr.debtor].push(curr);
                return acc;
            }, {});

            for (const name in grouped) {
                let personTotal = 0;
                html += `<div style="margin-bottom: 40px; border: 1px solid #e2e8f0; border-radius: 15px; overflow: hidden; page-break-inside: avoid;">
                    <div style="background: #f8fafc; padding: 15px 20px; border-bottom: 1px solid #e2e8f0;"><span style="font-weight: bold; font-size: 18px;">👤 คุณ${name}</span></div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead><tr style="background: #ffffff; text-align: left; font-size: 13px; color: #64748b;">
                            <th style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9;">รายการ</th>
                            <th style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; text-align: center;">ความคืบหน้า</th>
                            <th style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; text-align: right;">ยอดต้องชำระงวดนี้</th>
                        </tr></thead><tbody>`;

                grouped[name].forEach(item => {
                    const nextPay = item.payments.find(p => !p.isPaid);
                    const paidCount = item.payments.filter(p => p.isPaid).length;
                    const amount = nextPay ? nextPay.amount : 0;
                    personTotal += amount;
                    html += `<tr style="font-size: 14px; border-bottom: 1px solid #f8fafc;">
                        <td style="padding: 15px 20px;"><div style="font-weight: 600;">${item.item}</div></td>
                        <td style="padding: 15px 20px; text-align: center;"><span style="font-size: 11px;">${paidCount}/${item.totalMonths} งวด</span></td>
                        <td style="padding: 15px 20px; text-align: right; font-weight: bold;">฿${Math.round(amount).toLocaleString()}</td>
                    </tr>`;
                });
                html += `</tbody></table>
                <div style="background: #fffcf0; padding: 15px 20px; text-align: right; border-top: 2px dashed #e2e8f0;">
                    <span style="font-size: 13px; font-weight: bold;">รวมของเดือนนี้: </span>
                    <span style="font-size: 20px; font-weight: 900;">฿${Math.round(personTotal).toLocaleString()}</span>
                </div></div>`;
            }
            html += `<div style="margin-top: 50px; text-align: center; font-size: 11px; color: #94a3b8;">เอกสารนี้สร้างโดยระบบอัตโนมัติ - Debt Cloud</div></div>`;
            content.innerHTML = html;
            const opt = { margin: [0.5, 0.5], filename: `Debt-${type}.pdf`, html2canvas: { scale: 3 }, jsPDF: { unit: 'in', format: 'a4' } };
            html2pdf().set(opt).from(content).save();
        }

        window.onload = loadData;
    </script>
</body>
</html>
